<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Bách Khoa Toàn Thư IELTS Listening</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; padding: 20px; margin: 0; }
        .ielts-container { background-color: white; max-width: 850px; margin: auto; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { border-bottom: 2px solid #e0e0e0; padding-bottom: 15px; margin-bottom: 25px; text-align: center; }
        h1 { color: #d32f2f; margin: 0; text-transform: uppercase; }
        .audio-controls { background: #f1f3f4; padding: 15px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #ddd; text-align: center; }
        .speed-selector { margin-top: 10px; display: flex; align-items: center; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .speed-btn { background-color: white; border: 1px solid #ccc; padding: 6px 10px; border-radius: 15px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; }
        .speed-btn.active { background-color: #1976D2; color: white; border-color: #1976D2; }
        .question-box { background-color: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #dee2e6; margin-bottom: 20px; }
        
        .submit-btn { background-color: #c62828; color: white; border: none; padding: 18px; border-radius: 12px; font-size: 20px; font-weight: bold; width: 100%; margin-bottom: 15px; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover { background-color: #b71c1c; }
        .transcript-btn { background-color: #2196F3; color: white; border: none; padding: 18px; border-radius: 12px; font-size: 20px; font-weight: bold; width: 100%; margin-bottom: 15px; cursor: pointer; transition: 0.3s; }
        .transcript-btn:hover { filter: brightness(1.1); }
        .home-btn { background-color: #607d8b; color: white; text-decoration: none; display: block; text-align: center; padding: 18px; border-radius: 12px; font-size: 20px; font-weight: bold; width: 100%; box-sizing: border-box; transition: 0.3s; }
        .home-btn:hover { filter: brightness(1.1); }
        
        .transcript-box { margin-top: 25px; padding: 20px; background-color: #f8f9fa; border: 1px solid #ccc; display: none; border-radius: 8px; line-height: 1.6; font-size: 15px; color: #333; }
        
        /* CSS cho Đồng hồ */
        .timer-container { background-color: #fff9c4; color: #d32f2f; font-size: 22px; font-weight: bold; padding: 12px 20px; border-radius: 8px; text-align: center; margin-bottom: 25px; border: 2px solid #fbc02d; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; justify-content: center; align-items: center; gap: 10px; }
        .timer-warning { background-color: #ffebee !important; border-color: #d32f2f !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); box-shadow: 0 0 15px rgba(211, 47, 47, 0.5); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="ielts-container">
    <div class="header">
        <h1 id="test-title">Đang tải bài thi...</h1>
    </div>

    <div id="timer-container" class="timer-container">
        ⏳ Thời gian còn lại: <span id="time-display">40:00</span>
    </div>

    <div class="audio-controls">
        <audio id="ielts-audio" controls style="width: 100%;">
            <source id="audio-source" src="" type="audio/mpeg">
        </audio>
        <div class="speed-selector">
            <button class="speed-btn" onclick="document.getElementById('ielts-audio').currentTime -= 5">⏪ -5s</button>
            <button class="speed-btn" onclick="changeSpeed(0.75)">0.75x</button>
            <button class="speed-btn active" onclick="changeSpeed(1)">1.0x</button>
            <button class="speed-btn" onclick="changeSpeed(1.25)">1.25x</button>
            <button class="speed-btn" onclick="changeSpeed(1.5)">1.5x</button>
        </div>
    </div>

    <div id="questions-container"></div>

    <div id="result" style="margin-top: 20px; margin-bottom: 20px; font-weight: bold; font-size: 22px; text-align: center; color: #d32f2f;"></div>

    <button class="submit-btn" id="submit-btn" onclick="checkAnswers()">Nộp Bài & Lưu Kết Quả</button>
    <button class="transcript-btn" onclick="toggleTranscript()">Xem Transcript Đầy Đủ</button>
    <button class="transcript-btn" onclick="toggleVocab()" style="background-color: #9C27B0;">📖 Học Từ Vựng Key Của Bài</button>
    <a href="index.html" class="home-btn">🔙 Quay lại Sảnh chính</a>

    <div id="transcript-content" class="transcript-box"></div>

    <div id="vocab-content" class="transcript-box" style="background-color: #f3e5f5; border-color: #ce93d8;">
        <h3 style="color: #6a1b9a; margin-top: 0; border-bottom: 2px solid #ce93d8; padding-bottom: 10px;">Sổ tay Từ Vựng (Band 5.5 - 6.5)</h3>
        <p style="font-style: italic; font-size: 13px; color: #666;">💡 Mẹo: Hãy click trực tiếp vào từng thẻ từ vựng để nghe phát âm chuẩn nhé!</p>
        <div id="vocab-list" style="display: flex; flex-wrap: wrap; gap: 15px;"></div>
    </div>
</div>

<script type="module">
    import { allTests } from './data.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    // 1. CẤU HÌNH FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyAf846RI3kuxaWv_BCo3g4atdYK0iG98ds",
        authDomain: "luyen-nghe-ielts.firebaseapp.com",
        projectId: "luyen-nghe-ielts",
        storageBucket: "luyen-nghe-ielts.firebasestorage.app",
        messagingSenderId: "965541526782",
        appId: "1:965541526782:web:e54be5c7780feb197839af"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 2. TẢI DỮ LIỆU
    const urlParams = new URLSearchParams(window.location.search);
    const testId = urlParams.get('id') || "1";
    const currentTestData = allTests[testId];

    if (currentTestData) {
        document.getElementById('test-title').innerText = currentTestData.title;
        document.getElementById('audio-source').src = currentTestData.audio;
        document.getElementById('questions-container').innerHTML = currentTestData.questionsHTML;
        
        document.getElementById('transcript-content').innerHTML = `
            <h3 style="color: #d32f2f; margin-top:0;">Transcript Audio</h3>
            <div>${currentTestData.transcript}</div>
        `;
        document.getElementById('ielts-audio').load();
    }

    // 3. ĐIỀU KHIỂN TỐC ĐỘ AUDIO
    window.changeSpeed = function(rate) {
        const audio = document.getElementById('ielts-audio');
        const buttons = document.querySelectorAll('.speed-btn');
        audio.playbackRate = rate;
        buttons.forEach(btn => {
            btn.classList.remove('active');
            if (btn.innerText.includes(rate)) btn.classList.add('active');
        });
    };

    // "Giám thị" kiểm tra nộp bài
    window.isSubmitted = false; 

    // 4. BẬT TẮT TRANSCRIPT
    window.toggleTranscript = function() {
        if (!window.isSubmitted) {
            alert("🔒 Bạn phải 'Nộp Bài' trước thì mới được xem Transcript nhé!");
            return;
        }

        const box = document.getElementById('transcript-content');
        if (!currentTestData || !currentTestData.transcript) {
            alert("Bài nghe này hiện chưa cập nhật Transcript!");
            return;
        }

        if (box.style.display === 'none' || box.style.display === '') {
            box.style.display = 'block';
            box.scrollIntoView({ behavior: 'smooth' }); 
        } else {
            box.style.display = 'none';
        }
    };

    // 5. BẬT TẮT VÀ TẠO THẺ TỪ VỰNG PRO
    window.toggleVocab = function() {
        if (!window.isSubmitted) {
            alert("🔒 Làm bài xong rồi hãy xem từ vựng nha!");
            return;
        }

        const vocabBox = document.getElementById('vocab-content');
        const vocabList = document.getElementById('vocab-list');
        
        if (!currentTestData || !currentTestData.vocabulary) {
            alert("Bài nghe này hiện chưa cập nhật Từ vựng!");
            return;
        }

        if (vocabBox.style.display === 'none' || vocabBox.style.display === '') {
            vocabList.innerHTML = ''; 
            
            // Lặp qua mảng từ vựng để tạo các thẻ (Card)
            currentTestData.vocabulary.forEach(item => {
                const card = document.createElement('div');
                card.style.cssText = "background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: calc(50% - 7.5px); box-sizing: border-box; border-left: 5px solid #9c27b0; cursor: pointer; transition: 0.2s;";
                
                card.innerHTML = `
                    <div style="font-size: 18px; font-weight: bold; color: #333;">
                        ${item.word} <span style="font-size: 14px; color: #777; font-weight: normal;">(${item.type})</span>
                    </div>
                    <div style="color: #1976D2; font-size: 14px; margin: 6px 0;">${item.phonetic}</div>
                    <div style="color: #d32f2f; font-weight: 500;">${item.meaning}</div>
                `;

                // Logic đọc phát âm khi click
                card.onclick = () => {
                    let utterance = new SpeechSynthesisUtterance(item.word);
                    utterance.lang = 'en-GB'; // Giọng Anh
                    window.speechSynthesis.speak(utterance);
                    
                    // Nháy màu thẻ khi bấm
                    card.style.transform = "scale(0.98)";
                    card.style.backgroundColor = "#f3e5f5";
                    setTimeout(() => {
                        card.style.transform = "scale(1)";
                        card.style.backgroundColor = "white";
                    }, 200);
                };

                vocabList.appendChild(card);
            });

            vocabBox.style.display = 'block';
            vocabBox.scrollIntoView({ behavior: 'smooth' });
        } else {
            vocabBox.style.display = 'none';
        }
    };

    // 6. ĐỒNG HỒ ĐẾM NGƯỢC
    let timeLeft = 40 * 60; 
    let timerId;

    function startTimer() {
        const display = document.getElementById('time-display');
        const container = document.getElementById('timer-container');

        timerId = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(timerId);
                display.innerText = "00:00";
                alert("⏳ Đã hết thời gian làm bài! Hệ thống sẽ tự động nộp bài.");
                window.checkAnswers(); 
                return;
            }

            timeLeft--;
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;

            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;
            display.innerText = `${minutes}:${seconds}`;

            if (timeLeft <= 300) { 
                container.classList.add('timer-warning');
            }
        }, 1000);
    }
    window.addEventListener('load', startTimer);

    // 7. CHẤM ĐIỂM & LƯU FIREBASE
    window.checkAnswers = async function() {
        window.isSubmitted = true; // Báo hiệu đã nộp bài

        if (!currentTestData) return;
        const answers = currentTestData.answers;
        let score = 0;
        let totalQuestions = Object.keys(answers).length;

        clearInterval(timerId);

        for (let key in answers) {
            let correctAns = answers[key];
            let isAnswerArray = Array.isArray(correctAns);
            
            // Chấm Điền từ
            let textInput = document.getElementById(key);
            if (textInput) {
                let userVal = textInput.value.toLowerCase().trim();
                let isCorrect = isAnswerArray ? correctAns.includes(userVal) : (userVal === correctAns.toLowerCase());
                
                if (userVal !== "" && isCorrect) {
                    textInput.style.color = "#4CAF50"; 
                    textInput.style.borderBottomColor = "#4CAF50";
                    score++;
                } else {
                    textInput.style.color = "#d32f2f"; 
                    textInput.style.borderBottomColor = "#d32f2f";
                    let showAns = isAnswerArray ? correctAns[0] : correctAns;
                    textInput.value = (userVal || "Trống") + " ➔ " + showAns.toUpperCase();
                }
                textInput.disabled = true; 
            }

            // Chấm Trắc nghiệm
            let radios = document.querySelectorAll('input[name="' + key + '"]');
            if (radios.length > 0) {
                let selected = document.querySelector('input[name="' + key + '"]:checked');
                let userVal = selected ? selected.value : "";
                let isCorrect = isAnswerArray ? correctAns.includes(userVal) : (userVal === correctAns);

                if (isCorrect) {
                    selected.parentElement.style.color = "#4CAF50"; 
                    selected.parentElement.style.fontWeight = "bold";
                    score++;
                } else {
                    if (selected) {
                        selected.parentElement.style.color = "#d32f2f";
                        selected.parentElement.style.textDecoration = "line-through";
                    }
                    let correctValue = isAnswerArray ? correctAns[0] : correctAns;
                    let correctRadio = document.querySelector('input[name="' + key + '"][value="' + correctValue + '"]');
                    if (correctRadio) {
                        correctRadio.parentElement.style.color = "#4CAF50";
                        correctRadio.parentElement.style.fontWeight = "bold";
                    }
                }
                radios.forEach(r => r.disabled = true);
            }
        }

        const submitBtn = document.getElementById('submit-btn');
        if (submitBtn) {
            submitBtn.innerHTML = `Đã chấm xong! (F5 để làm lại)`;
            submitBtn.style.backgroundColor = "#4CAF50";
            submitBtn.style.pointerEvents = "none"; 
        }
        document.getElementById('result').innerText = `Điểm của bạn: ${score} / ${totalQuestions}`;
        
        if (score >= (totalQuestions * 0.8)) { 
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#d32f2f', '#1976D2', '#4CAF50', '#FFEB3B'] });
        }

        const user = auth.currentUser;
        if (user) {
            try {
                await addDoc(collection(db, "results"), {
                    userId: user.uid, email: user.email, testId: "Test " + testId,
                    score: score, totalQuestions: totalQuestions, timestamp: serverTimestamp()
                });
            } catch (error) {
                console.error("Lỗi lưu điểm: ", error);
            }
        }
    };
</script>
</body>
</html>
