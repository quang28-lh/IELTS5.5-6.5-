<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Từ Vựng - IELTS PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d32f2f;
            --secondary: #1976d2;
            --success: #16a34a;
            --danger: #dc2626;
            --bg-main: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --border-color: #e2e8f0;
        }

        [data-theme="dark"] {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --border-color: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            transition: 0.3s;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
        }

        .card-custom {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        /* --- FLASHCARD CẬP NHẬT TRÀN VIỀN --- */
        .flashcard {
            perspective: 1000px;
            width: 100%;
            max-width: 450px;
            height: 350px;
            margin: 20px auto;
            cursor: pointer;
        }

        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .flashcard.flipped .flashcard-inner {
            transform: rotateY(180deg);
        }

        .flashcard-front,
        .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 2px solid var(--secondary);
            background: var(--bg-card);
            box-sizing: border-box;
            overflow: hidden;
        }

        .flashcard-front {
            padding: 0 !important;
            justify-content: flex-end;
        }

        .flashcard-back {
            transform: rotateY(180deg);
            background: var(--bg-main);
            padding: 25px;
        }

        /* Ảnh bao phủ toàn bộ khung vuông */
        .word-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
            z-index: 1;
        }

        /* Dải mờ bảo vệ chữ trên nền ảnh */
        .fc-text-overlay {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            width: 100%;
            padding: 15px 0;
            border-top: 1px solid var(--border-color);
        }

        /* --- QUIZ & NAVIGATION --- */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .opt-btn {
            background: var(--bg-main);
            border: 2px solid var(--border-color);
            color: var(--text-main);
            padding: 18px;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .opt-btn.correct { background: #dcfce7 !important; border-color: var(--success) !important; color: #166534 !important; }
        .opt-btn.wrong { background: #fee2e2 !important; border-color: var(--danger) !important; color: #991b1b !important; }

        .btn-action {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            margin-top: 25px;
            font-size: 16px;
        }

        .nav-circle {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: var(--border-color);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill { height: 100%; background: var(--secondary); width: 0%; transition: 0.4s; }

        #quiz-screen, #result-screen { display: none; }
    </style>
</head>

<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <a href="academic.html" style="text-decoration: none; color: var(--text-main); font-weight: 700;">⬅ Quay lại</a>
            <h3 id="topic-title" style="margin: 0; color: var(--secondary); text-transform: uppercase;">TOPIC</h3>
        </div>

        <!-- SCREEN 1: FLASHCARD -->
        <div class="card-custom" id="flashcard-screen">
            <div class="flashcard" id="main-fc" onclick="this.classList.toggle('flipped')">
                <div class="flashcard-inner">
                    <div class="flashcard-front">
                        <img id="fc-img" src="" class="word-img" onerror="this.style.display='none'">
                        <div class="fc-text-overlay">
                            <h1 id="fc-word" style="margin: 0; color: var(--primary); font-size: 32px;">Word</h1>
                            <span id="fc-type" style="opacity: 0.6; font-style: italic;">(type)</span>
                        </div>
                    </div>
                    <div class="flashcard-back">
                        <h2 id="fc-mean" style="font-size: 28px; margin-bottom: 15px;">Nghĩa</h2>
                        <p id="fc-example" style="font-style: italic; opacity: 0.8; line-height: 1.6;"></p>
                    </div>
                </div>
            </div>
            <div style="display: flex; justify-content: center; gap: 25px; align-items: center; margin-top: 20px;">
                <button onclick="changeCard(-1)" class="nav-circle">⏮</button>
                <b id="fc-count" style="font-size: 18px;">1 / 1</b>
                <button onclick="changeCard(1)" class="nav-circle">⏭</button>
            </div>
            <button onclick="startQuiz()" class="btn-action" style="background: var(--success);">🎯 BẮT ĐẦU LÀM QUIZ</button>
        </div>

        <!-- SCREEN 2: QUIZ -->
        <div class="card-custom" id="quiz-screen">
            <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
            <p id="q-count" style="font-weight: 700; opacity: 0.7;">Câu 1/10</p>
            <h2 id="q-word" style="font-size: 40px; color: var(--secondary); margin: 20px 0;">Word</h2>
            <div class="options-grid" id="options"></div>
            <button id="next-btn" class="btn-action" style="display: none;">CÂU TIẾP THEO ➡</button>
        </div>

        <!-- SCREEN 3: RESULT -->
        <div class="card-custom" id="result-screen">
            <h1 style="font-size: 32px;">Kết quả: <span id="score" style="color: var(--primary);">0/0</span></h1>
            <p id="feedback" style="font-size: 18px; font-weight: 600; margin: 20px 0;"></p>
            <button onclick="location.reload()" class="btn-action">🔄 Luyện tập lại</button>
        </div>
    </div>

    <script src="vocab-data.js"></script>
    <script>
        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');

        const params = new URLSearchParams(window.location.search);
        const topicKey = params.get('topic') || 'education';
        
        // SỬ DỤNG ieltsDatabase TỪ vocab-data.js
        const topicData = ieltsDatabase[topicKey] || [];
        document.getElementById('topic-title').innerText = `Topic: ${topicKey}`;

        // --- LOGIC FLASHCARD ---
        let fcIdx = 0;
        function updateFC() {
            const item = topicData[fcIdx];
            const fc = document.getElementById('main-fc');
            fc.classList.remove('flipped');
            
            document.getElementById('fc-word').innerText = item.word;
            document.getElementById('fc-type').innerText = item.type || "";
            document.getElementById('fc-mean').innerText = item.mean;
            document.getElementById('fc-example').innerText = item.example ? `"${item.example}"` : "";
            
            const img = document.getElementById('fc-img');
            if (item.imageUrl) {
                img.src = item.imageUrl;
                img.style.display = 'block';
            } else {
                img.style.display = 'none';
            }
            document.getElementById('fc-count').innerText = `${fcIdx + 1} / ${topicData.length}`;
        }

        function changeCard(n) {
            fcIdx = (fcIdx + n + topicData.length) % topicData.length;
            updateFC();
        }

        if (topicData.length > 0) updateFC();

        // --- LOGIC QUIZ (RÚT 10 CÂU NGẪU NHIÊN) ---
        let quizItems = [];
        let qIdx = 0;
        let scoreCount = 0;

        function startQuiz() {
            document.getElementById('flashcard-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            quizItems = [...topicData].sort(() => Math.random() - 0.5).slice(0, 10);
            loadQuestion();
        }

        function loadQuestion() {
            const item = quizItems[qIdx];
            document.getElementById('q-word').innerText = item.word;
            document.getElementById('q-count').innerText = `Câu ${qIdx + 1} / ${quizItems.length}`;
            document.getElementById('fill').style.width = `${(qIdx / quizItems.length) * 100}%`;
            document.getElementById('next-btn').style.display = 'none';

            let choices = [item.mean];
            let pool = topicData.filter(i => i.mean !== item.mean).map(i => i.mean);
            choices.push(...pool.sort(() => Math.random() - 0.5).slice(0, 3));
            choices.sort(() => Math.random() - 0.5);

            const container = document.getElementById('options');
            container.innerHTML = '';
            choices.forEach(text => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = text;
                btn.onclick = () => {
                    if (document.querySelector('.opt-btn:disabled')) return;
                    document.querySelectorAll('.opt-btn').forEach(b => {
                        b.disabled = true;
                        if (b.innerText === item.mean) b.classList.add('correct');
                    });
                    if (text === item.mean) scoreCount++;
                    else btn.classList.add('wrong');
                    document.getElementById('next-btn').style.display = 'block';
                };
                container.appendChild(btn);
            });
        }

        document.getElementById('next-btn').onclick = () => {
            qIdx++;
            if (qIdx < quizItems.length) loadQuestion();
            else showResult();
        };

        function showResult() {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('score').innerText = `${scoreCount} / ${quizItems.length}`;
            document.getElementById('feedback').innerText = scoreCount >= 8 ? "Xuất sắc! 🔥" : "Hãy ôn kỹ Flashcard hơn nhé! 💪";
        }
    </script>
</body>

</html>
