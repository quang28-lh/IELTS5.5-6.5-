    <style>

        :root {

            --bg-card: #ffffff;
            --text-main: #1e293b;
            --border-color: #e2e8f0;
        }

        [data-theme="dark"] {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --border-color: #334155;
        }

        [data-theme="light-purple"] {
            --bg-main: #f3e8ff;
            --bg-card: #ffffff;
            --text-main: #4c1d95;
            --border-color: #e9d5ff;
        }

            --bg-main: #2e1065;
            --bg-card: #4c1d95;
            --text-main: #f3e8ff;
            --border-color: #6b21a8;
        }

        [data-theme="light-pink"] {
            --bg-main: #fce7f3;
            --bg-card: #ffffff;
            --text-main: #831843;
            --border-color: #fbcfe8;
        }

        [data-theme="dark-pink"] {
            --bg-main: #500724;
            --bg-card: #831843;
            --text-main: #fce7f3;
            --border-color: #9d174d;
        }

        [data-theme="light-blue"] {
            --bg-main: #e0f2fe;
            --bg-card: #ffffff;
            --text-main: #082f49;
            --border-color: #bae6fd;
        }

        [data-theme="dark-blue"] {
            --bg-main: #082f49;
            --bg-card: #0369a1;
            --text-main: #e0f2fe;
            --border-color: #0284c7;
        }

        [data-theme="light-matcha"] {
            --bg-main: #ecfdf5;
            --bg-card: #ffffff;
            --text-main: #064e3b;
            --border-color: #a7f3d0;
        }

        [data-theme="dark-matcha"] {
            --bg-main: #064e3b;
            --bg-card: #047857;
            --text-main: #ecfdf5;
            --border-color: #059669;
        }

            --bg-card: #ffffff;
            --text-main: #44403c;
            --border-color: #e7e5e4;

            --bg-main: #292524;
            --bg-card: #44403c;
            --text-main: #f5f5f4;
            --border-color: #57534e;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 20px;
            transition: 0.3s;
            margin: 0;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
        }

        .card-custom {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--card-shadow);
            text-align: center;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-back {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            text-decoration: none;
            transition: 0.2s;
        }

        .btn-back:hover {
            opacity: 0.8;
            transform: translateX(-3px);
        }

        .progress-container {
            width: 100%;
            background: var(--border-color);
            border-radius: 10px;
            height: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--secondary);
            width: 0%;
            transition: width 0.3s ease;
        }

        #word-display {
            font-size: 38px;
            font-weight: 900;
            color: var(--secondary);
            margin: 15px 0;
            letter-spacing: 1px;
        }

        #word-type {
            font-size: 16px;
            color: #64748b;
            font-style: italic;
            margin-bottom: 20px;
        }

        #progress-text {
            font-size: 14px;
            opacity: 0.7;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .opt-btn {
            background: var(--bg-main);
            border: 2px solid var(--border-color);
            color: var(--text-main);
            padding: 18px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .opt-btn:hover {
            border-color: var(--secondary);
            transform: translateY(-2px);
        }

        .opt-btn:disabled {
            cursor: not-allowed;
            transform: none;
        }

        .opt-btn.correct {
            background: #dcfce7 !important;
            border-color: var(--success) !important;
            color: #166534 !important;
        }

        .opt-btn.wrong {
            background: #fee2e2 !important;
            border-color: var(--danger) !important;
            color: #991b1b !important;
        }

        #next-btn {
            display: none;
            margin-top: 30px;
            background: var(--secondary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

        #next-btn:hover {
            opacity: 0.9;
        }

        #result-screen {
            display: none;
        }

            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: var(--secondary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;

            font-weight: 900;
            margin: 0 auto 20px;

</head>

        // ==========================================
        // LOGIC CHẠY BÀI TEST NGẪU NHIÊN (RÚT 10 CÂU)
        // ==========================================

        const urlParams = new URLSearchParams(window.location.search);
        let currentTopic = urlParams.get('topic');

        // Cú pháp mặc định nếu link gõ sai
        if (!currentTopic || !vocabDatabase[currentTopic]) {
            currentTopic = 'education';
        }

        // Tự động làm đẹp tên tiêu đề (VD: "food_drinks" -> "Food_drinks")
        let formattedTitle = currentTopic.charAt(0).toUpperCase() + currentTopic.slice(1);
        formattedTitle = formattedTitle.replace('_', ' & '); // Làm đẹp nếu có dấu gạch dưới
        document.getElementById('topic-title').innerText = `📚 Topic: ${formattedTitle}`;

        const rawVocabData = vocabDatabase[currentTopic];
        const allMeanings = rawVocabData.map(v => v.mean);

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // Bốc ngẫu nhiên 10 câu cho bài test
        const QUESTIONS_PER_TEST = 10;
        const randomizedVocab = shuffle([...rawVocabData]).slice(0, Math.min(QUESTIONS_PER_TEST, rawVocabData.length));

        const vocabData = randomizedVocab.map((item) => {
            let wrongOptions = allMeanings.filter(m => m !== item.mean);
            wrongOptions = shuffle(wrongOptions).slice(0, 3);
            let options = shuffle([...wrongOptions, item.mean]);
            return {
                word: item.word,
                type: item.type,
                options: options,
                correctIndex: options.indexOf(item.mean)
            };
        });

        let currentQuestionIndex = 0;
        let score = 0;

        const wordDisplay = document.getElementById('word-display');
        const wordType = document.getElementById('word-type');
        const optionsContainer = document.getElementById('options-container');
        const progressText = document.getElementById('progress-text');
        const progressBar = document.getElementById('progress-bar');
        const nextBtn = document.getElementById('next-btn');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');

        function loadQuestion() {
            const currentQ = vocabData[currentQuestionIndex];
            wordDisplay.innerText = currentQ.word.charAt(0).toUpperCase() + currentQ.word.slice(1);
            wordType.innerText = currentQ.type;

            progressText.innerText = `Câu ${currentQuestionIndex + 1} / ${vocabData.length}`;
            progressBar.style.width = `${((currentQuestionIndex) / vocabData.length) * 100}%`;

            optionsContainer.innerHTML = '';
            nextBtn.style.display = 'none';

            currentQ.options.forEach((optionText, index) => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = optionText.charAt(0).toUpperCase() + optionText.slice(1);
                btn.onclick = () => checkAnswer(btn, index, currentQ.correctIndex);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedBtn, selectedIndex, correctIndex) {
            const allBtns = document.querySelectorAll('.opt-btn');
            allBtns.forEach(btn => btn.disabled = true);

            if (selectedIndex === correctIndex) {
                selectedBtn.classList.add('correct');
                score++;
            } else {
                selectedBtn.classList.add('wrong');
                allBtns[correctIndex].classList.add('correct');
            }

            nextBtn.style.display = 'block';
        }

        nextBtn.onclick = () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < vocabData.length) {
                loadQuestion();
            } else {
                showResult();
            }
        };

        function showResult() {
            quizScreen.style.display = 'none';
            resultScreen.style.display = 'block';

            document.getElementById('final-score').innerText = `${score}/${vocabData.length}`;

            let percentage = score / vocabData.length;
            let msg = "";
            if (percentage === 1) msg = "Tuyệt đỉnh! Điểm tối đa! 🏆";
            else if (percentage >= 0.8) msg = "Rất xuất sắc! Vốn từ của bạn cực kỳ chắc chắn. ⭐";
            else if (percentage >= 0.5) msg = "Khá tốt! Nhưng hãy ôn lại để đạt điểm cao hơn nhé. 👍";
            else msg = "Cần cố gắng nhiều hơn! Đừng nản chí nhé. 💪";

            document.getElementById('feedback-msg').innerText = msg;
        }

        loadQuestion();
    </script>
