<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Thi THPTQG - Aura Diamond</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --p: #00f2ff;
            --a: #bc13fe;
            --bg: #010208;
            --neon: 0 0 25px rgba(0, 242, 255, 0.6);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: #f1f5f9;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
        }

        .diamond-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(50px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        .btn-action {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, var(--p), var(--a));
            color: #000;
            border: none;
            border-radius: 20px;
            font-weight: 800;
            font-size: 20px;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 20px;
        }

        .error-msg {
            text-align: center;
            padding: 40px;
        }

        .error-msg h2 {
            color: #ff3d3d;
            font-size: 50px;
            margin-bottom: 20px;
        }

        .timer-vip {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #000;
            color: var(--p);
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 800;
            border: 2px solid var(--p);
            z-index: 1000;
            display: none;
        }

        .q-item {
            background: rgba(255, 255, 255, 0.02);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .opt-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .opt-btn {
            padding: 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #cbd5e1;
            cursor: pointer;
            text-align: left;
            transition: 0.3s;
        }

        .opt-btn.active {
            border-color: var(--p);
            background: rgba(0, 242, 255, 0.1);
            box-shadow: var(--neon);
            color: #fff;
        }

        .opt-btn.correct {
            background: #059669 !important;
            border-color: #10b981 !important;
            color: white !important;
        }

        .opt-btn.wrong {
            background: #991b1b !important;
            border-color: #ef4444 !important;
            color: white !important;
        }

        .analysis-vip {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 242, 255, 0.05);
            border-radius: 15px;
            border-left: 5px solid var(--p);
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div class="timer-vip" id="clock-vip">00:00</div>
    <div class="container">
        <button onclick="window.history.back()"
            style="background:none; border:1px solid #334155; color:#94a3b8; padding:10px 20px; border-radius:10px; cursor:pointer; margin-bottom:20px;">⬅
            QUAY LẠI</button>

        <div id="main-root" class="diamond-card">
            <div id="status-area" style="text-align: center; padding: 60px;">
                <div style="font-size: 40px; margin-bottom: 20px;">🔱</div>
                <div style="font-weight: 700; letter-spacing: 2px;">ĐANG KẾT NỐI HỆ THỐNG DỮ LIỆU...</div>
                <p style="opacity: 0.6; margin-top: 10px;">Lưu ý: Bạn phải dùng Live Server để chạy được tính năng này.
                </p>
            </div>
        </div>

        <div id="quiz-root" style="display: none;">
            <div id="list-target"></div>
            <button id="btn-finish" class="btn-action">NỘP BÀI & XEM GIẢI CHI TIẾT 🚀</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAf846RI3kuxaWv_BCo3g4atdYK0iG98ds", authDomain: "luyen-nghe-ielts.firebaseapp.com", projectId: "luyen-nghe-ielts", storageBucket: "luyen-nghe-ielts.firebasestorage.app", messagingSenderId: "965541526782", appId: "1:965541526782:web:e54be5c7780feb197839af" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const params = new URLSearchParams(window.location.search);
        const sub = params.get('sub') || 'english';
        const id = params.get('id') || '001';
        let currentUser = null; let qData = []; let testTitle = "";

        onAuthStateChanged(auth, (user) => { currentUser = user; });

        async function init() {
            const root = document.getElementById('main-root');
            try {
                const snap = await getDoc(doc(db, `${sub}_topics`, id));
                if (snap.exists()) {
                    const d = snap.data(); testTitle = d.title || "Đề thi thử";
                    root.innerHTML = `
                        <h1 style="color:var(--p); font-size:32px; margin-bottom:10px;">${testTitle}</h1>
                        <div style="margin-bottom:30px; opacity:0.8; line-height:1.6;">${d.content || 'Sẵn sàng bắt đầu bài thi THPTQG.'}</div>
                        <button class="btn-action" id="btn-start">BẮT ĐẦU LÀM BÀI NGAY</button>
                    `;
                    document.getElementById('btn-start').onclick = start;
                    qData = typeof d.answers === 'string' ? JSON.parse(d.answers) : d.answers;
                } else {
                    root.innerHTML = `<div class="error-msg"><h2>❌</h2><b>Mã đề "${id}" không tồn tại!</b><br><p>Vui lòng kiểm tra lại ID đề thi trong Firestore của bạn.</p></div>`;
                }
            } catch (e) {
                root.innerHTML = `<div class="error-msg"><h2>⚠️</h2><b>Lỗi kết nối bảo mật!</b><br><p>Bạn đang mở file trực tiếp. Hãy chuột phải vào file trong VS Code và chọn <b>Open with Live Server</b>.</p></div>`;
            }
        }

        function start() {
            document.getElementById('main-root').style.display = 'none';
            document.getElementById('quiz-root').style.display = 'block';
            document.getElementById('clock-vip').style.display = 'block';
            let s = 45 * 60;
            const timer = setInterval(() => {
                s--; let m = Math.floor(s / 60), ss = s % 60;
                document.getElementById('clock-vip').innerText = `${m < 10 ? '0' + m : m}:${ss < 10 ? '0' + ss : ss}`;
                if (s <= 0) { clearInterval(timer); finish(); }
            }, 1000);

            document.getElementById('list-target').innerHTML = qData.map((q, i) => `
                <div class="q-item" id="q-${i}">
                    <div style="font-weight:800; color:var(--p); margin-bottom:15px; font-size:14px; letter-spacing:2px;">QUESTION ${i + 1}</div>
                    <div style="font-size:20px; line-height:1.6; margin-bottom:20px;">${q.question}</div>
                    <div class="opt-grid">
                        ${q.options.map((o, j) => `<button class="opt-btn" data-qi="${i}" data-oi="${j}">${String.fromCharCode(65 + j)}. ${o}</button>`).join('')}
                    </div>
                    <div class="analysis-vip" id="an-${i}"><b>🔱 GIẢI THÍCH:</b><br>${q.explain || 'Chưa có giải thích cho câu này.'}</div>
                </div>`).join('');

            document.querySelectorAll('.opt-btn').forEach(btn => btn.onclick = function () {
                const qi = this.getAttribute('data-qi');
                document.getElementById(`q-${qi}`).querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
            document.getElementById('btn-finish').onclick = finish;
        }

        async function finish() {
            let score = 0;
            qData.forEach((q, i) => {
                const block = document.getElementById(`q-${i}`);
                const active = block.querySelector('.opt-btn.active');
                const choice = active ? parseInt(active.getAttribute('data-oi')) : -1;
                const btns = block.querySelectorAll('.opt-btn');
                btns[q.correctIndex].classList.add('correct');
                if (choice === q.correctIndex) score++; else if (choice !== -1) btns[choice].classList.add('wrong');
                block.querySelector('.analysis-vip').style.display = 'block';
            });
            if (currentUser) {
                await addDoc(collection(db, "results"), { userId: currentUser.uid, userEmail: currentUser.email, testTitle: `[THPT] ${testTitle}`, score: score, timestamp: serverTimestamp() });
            }
            confetti({ particleCount: 500, spread: 150, origin: { y: 0.6 } });
            window.scrollTo({ top: 0, behavior: 'smooth' });
            alert(`Chúc mừng! Bạn đạt ${score}/${qData.length} câu đúng.`);
        }
        init();
    </script>
</body>

</html>
