<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards - IELTS PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #d32f2f; --secondary: #1e293b; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .back-btn { padding: 12px 20px; background: white; border-radius: 14px; text-decoration: none; color: #1e293b; font-weight: 700; border: 1px solid #e2e8f0; }
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        /* --- Sửa Lỗi Hiển Thị Ngược --- */
        .flashcard { height: 250px; perspective: 1000px; cursor: pointer; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; border-radius: 20px; }
        .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
        
        .front, .back { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Mặt trước: Tiếng Anh */
        .front { background-size: cover; background-position: center; background-color: #1e293b; justify-content: flex-end; z-index: 2; transform: rotateY(0deg); }
        .front-overlay { background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.8)); width: 100%; padding: 20px; box-sizing: border-box; }
        .front h2 { color: white !important; margin: 0; font-size: 24px; text-align: left; }
        .front p { color: rgba(255,255,255,0.7) !important; margin: 5px 0 0 0; font-style: italic; }

        /* Mặt sau: Tiếng Việt */
        .back { transform: rotateY(180deg); background: white; justify-content: center; align-items: center; padding: 25px; border: 2px solid #e2e8f0; box-sizing: border-box; z-index: 1; }
        .meaning-text { font-size: 24px; font-weight: 800; color: #d32f2f; margin-bottom: 15px; text-align: center; }
        .example-text { font-size: 15px; line-height: 1.6; color: #64748b; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-header">
            <a href="academic.html" class="back-btn">⬅ Menu</a>
            <div id="topic-name" style="font-weight: 800; color: var(--primary); padding: 5px 15px; border-radius: 20px; background: rgba(211,47,47,0.1);">Đang tải...</div>
        </div>
        <div class="vocab-grid" id="vocab-container"></div>
    </div>

    <script src="vocab-data.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const topicId = urlParams.get('topic') || "travel";

        // Logic hút dữ liệu chuẩn
        const words = (typeof ieltsDatabase !== 'undefined') ? (ieltsDatabase[topicId] || []) : [];

        const topicDisplay = document.getElementById('topic-name');
        if (topicDisplay) { topicDisplay.innerText = `CHỦ ĐỀ: ${topicId.toUpperCase()}`; }

        const container = document.getElementById('vocab-container');
        if (words.length === 0) {
            container.innerHTML = "<p style='text-align:center; padding:40px; grid-column: 1/-1;'>Chưa có dữ liệu...</p>";
        } else {
            words.forEach(item => {
                const card = document.createElement('div');
                card.className = 'flashcard';
                card.onclick = () => card.classList.toggle('flipped');

                const bg = item.imageUrl ? `background-image: url('${item.imageUrl}')` : '';
                const meaning = item.mean || item.meaning;

                card.innerHTML = `
                    <div class="flashcard-inner">
                        <div class="front" style="${bg}">
                            <div class="front-overlay"><h2>${item.word}</h2><p>${item.type}</p></div>
                        </div>
                        <div class="back">
                            <div class="meaning-text">${meaning}</div>
                            <div class="example-text"><b>Ví dụ:</b> ${item.example}</div>
                        </div>
                    </div>`;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
