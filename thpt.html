<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Thi THPT Quốc Gia - Bách Khoa Toàn Thư</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --border-color: #e2e8f0;
            --primary: #d32f2f;
            --secondary: #1976d2;
            --success: #22c55e;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --border-color: #334155;
        }

        /* --- CÁC THEME MÀU SẮC --- */
        [data-theme="light-pink"] {
            --bg-main: #fdf2f8;
            --bg-card: #ffffff;
            --text-main: #831843;
            --border-color: #fbcfe8;
            --primary: #db2777;
            --secondary: #ec4899;
        }

        [data-theme="light-matcha"] {
            --bg-main: #f0fdf4;
            --bg-card: #ffffff;
            --text-main: #14532d;
            --border-color: #bbf7d0;
            --primary: #16a34a;
            --secondary: #22c55e;
        }

        [data-theme="light-purple"] {
            --bg-main: #faf5ff;
            --bg-card: #ffffff;
            --text-main: #581c87;
            --border-color: #e9d5ff;
            --primary: #9333ea;
            --secondary: #a855f7;
        }

        [data-theme="dark-purple"] {
            --bg-main: #2e1065;
            --bg-card: #3b0764;
            --text-main: #f3e8ff;
            --border-color: #581c87;
            --primary: #d8b4fe;
            --secondary: #c084fc;
        }

        [data-theme="light-blue"] {
            --bg-main: #f0f9ff;
            --bg-card: #ffffff;
            --text-main: #0c4a6e;
            --border-color: #bae6fd;
            --primary: #0284c7;
            --secondary: #38bdf8;
        }

        [data-theme="dark-blue"] {
            --bg-main: #082f49;
            --bg-card: #0f172a;
            --text-main: #e0f2fe;
            --border-color: #0369a1;
            --primary: #7dd3fc;
            --secondary: #38bdf8;
        }

        /* --- GIAO DIỆN CHÍNH --- */
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-main);
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            transition: 0.3s;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        .dashboard-container {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 30px;
            box-shadow: var(--card-shadow);
            position: relative;
        }

        .header-box {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        h1 {
            margin: 0;
            color: var(--primary);
            font-size: 22px;
            text-transform: uppercase;
        }

        .btn-back {
            display: inline-flex;
            font-weight: bold;
            color: var(--secondary);
            text-decoration: none;
            margin-bottom: 20px;
        }

        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .subject-card {
            background: var(--bg-card);
            border: 2px solid transparent;
            padding: 30px 20px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: var(--card-shadow);
            text-decoration: none;
            color: var(--text-main);
            display: block;
        }

        .subject-card:hover {
            border-color: var(--secondary);
            transform: translateY(-5px);
        }

        .subject-card .icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .subject-card h3 {
            margin: 0;
            font-size: 20px;
        }

        /* --- CSS CHO NÚT VÀ MENU THEME --- */
        .theme-dropdown {
            position: relative;
            display: inline-block;
        }

        .theme-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-btn:hover {
            transform: scale(1.05);
        }

        .theme-menu {
            display: none;
            position: absolute;
            top: 120%;
            right: 0;
            background-color: #1e293b;
            color: #f8fafc;
            min-width: 160px;
            border-radius: 10px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            padding: 8px 0;
            z-index: 9999;
        }

        .theme-menu.active {
            display: block; 
        }

        .theme-option {
            padding: 10px 16px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .theme-option:hover {
            background-color: #334155;
        }
    </style>
</head>

<body>
    <div class="dashboard-container container">
        <a href="index.html" class="btn-back">⬅ Quay lại trang chủ</a>

        <!-- Nút chọn Theme -->
        <div style="position: absolute; top: 20px; right: 20px; z-index: 100;">
            <div class="theme-dropdown">
                <button id="theme-btn" class="theme-btn">🎨</button>
                <div id="theme-menu" class="theme-menu">
                    <div class="theme-option" data-value="light">☀️ Light</div>
                    <div class="theme-option" data-value="dark">🌙 Dark</div>
                    <div class="theme-option" data-value="light-pink">🌸 Light Pink</div>
                    <div class="theme-option" data-value="light-matcha">🍵 Light Matcha</div>
                    <div class="theme-option" data-value="light-purple">💜 Light Purple</div>
                    <div class="theme-option" data-value="dark-purple">🌌 Dark Purple</div>
                    <div class="theme-option" data-value="light-blue">🌊 Light Blue</div>
                    <div class="theme-option" data-value="dark-blue">🌃 Dark Blue</div>
                </div>
            </div>
        </div>

        <div class="header-box">
            <h1>🎓 LUYỆN THI THPT QUỐC GIA PRO</h1>
        </div>

        <h2 style="text-align: center;">Chọn môn học bạn muốn ôn luyện</h2>

        <div class="subject-grid">
            <a href="subject-detail.html?sub=math" class="subject-card">
                <div class="icon">📐</div>
                <h3>Môn Toán</h3>
            </a>

            <a href="subject-detail.html?sub=physics" class="subject-card">
                <div class="icon">⚛️</div>
                <h3>Môn Vật Lý</h3>
            </a>

            <a href="subject-detail.html?sub=chemistry" class="subject-card">
                <div class="icon">🧪</div>
                <h3>Môn Hóa Học</h3>
            </a>

            <a href="subject-detail.html?sub=english" class="subject-card">
                <div class="icon">🇬🇧</div>
                <h3>Môn Tiếng Anh</h3>
            </a>
        </div>
    </div>

    <!-- Script đổi màu nền chung của hệ thống -->
    <script src="theme.js"></script>
</body>

</html>
