<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Hệ thống IELTS</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background-color: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); width: 400px; text-align: center; box-sizing: border-box; }
        .auth-container h1 { color: #d32f2f; margin-top: 0; margin-bottom: 30px; font-size: 28px; text-transform: uppercase; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        .input-group input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; box-sizing: border-box; transition: 0.3s; font-family: inherit; }
        .input-group input:focus { border-color: #2196F3; outline: none; }
        .primary-btn { background-color: #2196F3; color: white; border: none; padding: 15px; font-size: 18px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .primary-btn:hover { background-color: #1976D2; }
        .toggle-link { display: block; margin-top: 20px; color: #555; text-decoration: none; font-size: 15px; }
        .toggle-link span { color: #d32f2f; font-weight: bold; cursor: pointer; }
        .toggle-link span:hover { text-decoration: underline; }
        .back-home { display: inline-block; margin-top: 30px; color: #607D8B; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .back-home:hover { color: #455A64; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h1 id="form-title">ĐĂNG NHẬP</h1>
        <form id="auth-form">
            <div class="input-group">
                <label for="email">Email của bạn</label>
                <!-- Dùng type="email" để HTML tự chặn định dạng sai -->
                <input type="email" id="email" placeholder="ví dụ: student@gmail.com" required>
            </div>
            
            <!-- Nhóm SĐT (Mặc định ẩn, chỉ hiện khi đăng ký) -->
            <div class="input-group" id="phone-group" style="display: none;">
                <label for="phone">Số điện thoại</label>
                <input type="tel" id="phone" placeholder="Ví dụ: 0912345678" pattern="^(03|05|07|08|09)[0-9]{8}$" title="Vui lòng nhập đúng 10 số">
            </div>

            <div class="input-group">
                <label for="password">Mật khẩu (ít nhất 6 ký tự)</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu" required minlength="6">
            </div>

            <button type="submit" class="primary-btn" id="submit-btn">Vào phòng thi</button>
        </form>

        <div class="toggle-link" id="toggle-text">
            Chưa có tài khoản? <span>Đăng ký ngay</span>
        </div>
        
        <a href="index.html" class="back-home">🔙 Quay lại Sảnh chính</a>
    </div>

    <!-- MỘT THẺ SCRIPT DUY NHẤT VÀ SẠCH SẼ -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        // Import thêm Firestore để lưu SĐT
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAf846RI3kuxaWv_BCo3g4atdYK0iG98ds",
            authDomain: "luyen-nghe-ielts.firebaseapp.com",
            projectId: "luyen-nghe-ielts",
            storageBucket: "luyen-nghe-ielts.firebasestorage.app",
            messagingSenderId: "965541526782",
            appId: "1:965541526782:web:e54be5c7780feb197839af"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isLoginMode = true;

        // Bắt các element HTML
        const authForm = document.getElementById('auth-form');
        const formTitle = document.getElementById('form-title');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const phoneGroup = document.getElementById('phone-group');
        const phoneInput = document.getElementById('phone');
        const toggleText = document.getElementById('toggle-text');
        const submitBtn = document.getElementById('submit-btn');

        // Xử lý chuyển đổi Đăng nhập / Đăng ký
        toggleText.addEventListener('click', (e) => {
            if(e.target.tagName.toLowerCase() !== 'span') return; // Chỉ nhận click vào thẻ span
            
            isLoginMode = !isLoginMode;
            
            if (isLoginMode) {
                formTitle.innerText = "ĐĂNG NHẬP";
                submitBtn.innerText = "Vào phòng thi";
                submitBtn.style.backgroundColor = "#2196F3";
                toggleText.innerHTML = 'Chưa có tài khoản? <span>Đăng ký ngay</span>';
                
                // Ẩn SĐT và gỡ bắt buộc
                phoneGroup.style.display = "none";
                phoneInput.removeAttribute('required');
            } else {
                formTitle.innerText = "TẠO TÀI KHOẢN MỚI";
                submitBtn.innerText = "Đăng ký thành viên";
                submitBtn.style.backgroundColor = "#4CAF50"; 
                toggleText.innerHTML = 'Đã có tài khoản? <span>Đăng nhập</span>';
                
                // Hiện SĐT và ép buộc phải nhập
                phoneGroup.style.display = "block";
                phoneInput.setAttribute('required', 'true');
            }
        });

        // Xử lý Form Submit
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const phone = phoneInput.value.trim();

            submitBtn.innerText = "Đang xử lý..."; 
            submitBtn.style.opacity = "0.7";

            try {
                if (isLoginMode) {
                    // --- CHẾ ĐỘ ĐĂNG NHẬP ---
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;
                    
                    // KIỂM TRA EMAIL XÁC THỰC
                    if (!user.emailVerified) {
                        alert("Tài khoản chưa được xác thực! Vui lòng kiểm tra Hộp thư email (hoặc mục Spam) để kích hoạt tài khoản.");
                        await signOut(auth); // Đuổi ra ngoài ngay lập tức
                    } else {
                        alert("Đăng nhập thành công!");
                        window.location.href = "index.html";
                    }

                } else {
                    // --- CHẾ ĐỘ ĐĂNG KÝ ---
                    // 1. Tạo tài khoản Auth
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;

                    // 2. Gửi Email xác nhận
                    await sendEmailVerification(user);

                    // 3. Lưu SĐT và thông tin vào Database (Firestore)
                    await setDoc(doc(db, "users", user.uid), {
                        email: email,
                        phone: phone,
                        role: "student",
                        createdAt: serverTimestamp()
                    });

                    // 4. Đăng xuất luôn để ép người dùng đi check mail
                    await signOut(auth);

                    alert("Tạo tài khoản thành công! Mã xác thực đã được gửi. Vui lòng kiểm tra Email của bạn để xác thực trước khi đăng nhập.");
                    
                    // Tự động quay về giao diện Đăng nhập
                    isLoginMode = true;
                    formTitle.innerText = "ĐĂNG NHẬP";
                    submitBtn.innerText = "Vào phòng thi";
                    submitBtn.style.backgroundColor = "#2196F3";
                    toggleText.innerHTML = 'Chưa có tài khoản? <span>Đăng ký ngay</span>';
                    phoneGroup.style.display = "none";
                    phoneInput.removeAttribute('required');
                    authForm.reset();
                }
            } catch (error) {
                // Xử lý báo lỗi bằng Tiếng Việt
                if (error.code === 'auth/email-already-in-use') {
                    alert("Email này đã được đăng ký từ trước!");
                } else if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
                    alert("Tài khoản hoặc mật khẩu không chính xác!");
                } else {
                    alert("Có lỗi xảy ra: " + error.message);
                }
            } finally {
                // Nhả nút bấm ra trạng thái bình thường
                submitBtn.innerText = isLoginMode ? "Vào phòng thi" : "Đăng ký thành viên";
                submitBtn.style.opacity = "1";
            }
        });
    </script>
</body>
</html>
