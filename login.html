<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Hệ thống IELTS</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background-color: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); width: 400px; text-align: center; box-sizing: border-box; }
        .auth-container h1 { color: #d32f2f; margin-top: 0; margin-bottom: 30px; font-size: 28px; text-transform: uppercase; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        .input-group input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; box-sizing: border-box; transition: 0.3s; font-family: inherit; }
        .input-group input:focus { border-color: #2196F3; outline: none; }
        .primary-btn { background-color: #2196F3; color: white; border: none; padding: 15px; font-size: 18px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .primary-btn:hover { background-color: #1976D2; }
        .toggle-link { display: block; margin-top: 20px; color: #555; text-decoration: none; font-size: 15px; }
        .toggle-link span { color: #d32f2f; font-weight: bold; cursor: pointer; }
        .toggle-link span:hover { text-decoration: underline; }
        .back-home { display: inline-block; margin-top: 30px; color: #607D8B; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .back-home:hover { color: #455A64; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h1 id="form-title">ĐĂNG NHẬP</h1>
        <form id="auth-form">
            <div class="input-group">
                <label for="email">Email của bạn</label>
                <input type="email" id="email" placeholder="ví dụ: student@gmail.com" required>
            </div>
            <div class="input-group">
                <label for="password">Mật khẩu (ít nhất 6 ký tự)</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu" required minlength="6">
            </div>
            <button type="submit" class="primary-btn" id="submit-btn">Vào phòng thi</button>
        </form>
        <div class="toggle-link" id="toggle-text">
            Chưa có tài khoản? <span onclick="window.toggleMode()">Đăng ký ngay</span>
        </div>
        <a href="index.html" class="back-home">🔙 Quay lại Sảnh chính</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        // Sử dụng chính xác apiKey bạn vừa gửi
        let isLoginMode = true;

        window.toggleMode = function() {
            isLoginMode = !isLoginMode;
            const title = document.getElementById('form-title');
            const btn = document.getElementById('submit-btn');
            const toggleText = document.getElementById('toggle-text');
            if (isLoginMode) {
                title.innerText = "ĐĂNG NHẬP";
                btn.innerText = "Vào phòng thi";
                btn.style.backgroundColor = "#2196F3";
                toggleText.innerHTML = 'Chưa có tài khoản? <span onclick="window.toggleMode()">Đăng ký ngay</span>';
            } else {
                title.innerText = "TẠO TÀI KHOẢN MỚI";
                btn.innerText = "Đăng ký thành viên";
                btn.style.backgroundColor = "#4CAF50"; 
                toggleText.innerHTML = 'Đã có tài khoản? <span onclick="window.toggleMode()">Đăng nhập</span>';
            }
        };

        document.getElementById('auth-form').addEventListener('submit', function(event) {
            event.preventDefault(); 
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submit-btn');
            btn.innerText = "Đang xử lý..."; 
            btn.style.opacity = "0.7";

            if (isLoginMode) {
                signInWithEmailAndPassword(auth, email, password)
                    .then(() => { 
                        alert("Đăng nhập thành công!"); 
                        window.location.href = "index.html"; 
                    })
                    .catch((error) => { 
                        alert("Lỗi đăng nhập: " + error.message); 
                        btn.innerText = "Vào phòng thi"; 
                        btn.style.opacity = "1"; 
                    });
            } else {
                createUserWithEmailAndPassword(auth, email, password)
                    .then(() => { 
                        alert("Tạo tài khoản thành công!"); 
                        window.location.href = "index.html"; 
                    })
                    .catch((error) => { 
                        alert("Lỗi đăng ký: " + error.message); 
                        btn.innerText = "Đăng ký thành viên"; 
                        btn.style.opacity = "1"; 
                    });
            }
        });
    </script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        // Config Firebase của dự án (mình lấy lại từ file cũ của bạn)
        const firebaseConfig = {
            apiKey: "AIzaSyAf846RI3kuxaWv_BCo3g4atdYK0iG98ds",
            authDomain: "luyen-nghe-ielts.firebaseapp.com",
            projectId: "luyen-nghe-ielts",
            storageBucket: "luyen-nghe-ielts.firebasestorage.app",
            messagingSenderId: "965541526782",
            appId: "1:965541526782:web:e54be5c7780feb197839af"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Lấy các thẻ HTML dựa theo id và class của bạn
        const authForm = document.getElementById('auth-form');
        const formTitle = document.getElementById('form-title');
        
        // LƯU Ý KỸ: Bạn phải đảm bảo trong HTML, ô nhập email có id="email" và ô password có id="password" nhé!
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password'); 
        
        const toggleLink = document.querySelector('.toggle-link'); 
        const submitBtn = document.querySelector('.primary-btn');

        let isLogin = true; // Mặc định mở lên là form Đăng nhập

        // Xử lý khi người dùng bấm dòng chữ chuyển đổi Đăng ký / Đăng nhập
        if (toggleLink) {
            toggleLink.addEventListener('click', (e) => {
                e.preventDefault();
                isLogin = !isLogin; // Đảo trạng thái
                
                formTitle.innerText = isLogin ? "ĐĂNG NHẬP" : "ĐĂNG KÝ";
                if (submitBtn) submitBtn.innerText = isLogin ? "Vào hệ thống" : "Tạo tài khoản";
                toggleLink.innerHTML = isLogin ? "Chưa có tài khoản? <span>Đăng ký ngay</span>" : "Đã có tài khoản? <span>Đăng nhập</span>";
            });
        }

        // Xử lý khi người dùng bấm nút Submit
        if (authForm) {
            authForm.addEventListener('submit', async (e) => {
                e.preventDefault(); // Chặn hành vi tải lại trang mặc định của form
                
                const email = emailInput.value.trim();
                const password = passwordInput.value;

                if (!email || !password) {
                    alert("Vui lòng nhập đủ email và mật khẩu!");
                    return;
                }

                try {
                    if (isLogin) {
                        // Gửi lệnh Đăng nhập lên Firebase
                        await signInWithEmailAndPassword(auth, email, password);
                        alert("Đăng nhập thành công!");
                    } else {
                        // Gửi lệnh Tạo tài khoản lên Firebase
                        await createUserWithEmailAndPassword(auth, email, password);
                        alert("Tạo tài khoản thành công!");
                    }
                    // Đăng nhập thành công thì tự động đá sang trang chủ
                    window.location.href = "index.html";
                } catch (error) {
                    alert("Có lỗi xảy ra: " + error.message);
                }
            });
        }
    </script>
</body>
</html>
