<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Hệ thống IELTS</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .auth-container {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            width: 400px;
            text-align: center;
            box-sizing: border-box;
        }
        .auth-container h1 {
            color: #d32f2f;
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 28px;
            text-transform: uppercase;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.3s;
            font-family: inherit;
        }
        .input-group input:focus {
            border-color: #2196F3;
            outline: none;
        }
        
        /* Các nút bấm */
        .primary-btn {
            background-color: #2196F3;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 10px;
        }
        .primary-btn:hover { background-color: #1976D2; }
        
        .toggle-link {
            display: block;
            margin-top: 20px;
            color: #555;
            text-decoration: none;
            font-size: 15px;
        }
        .toggle-link span {
            color: #d32f2f;
            font-weight: bold;
            cursor: pointer;
        }
        .toggle-link span:hover { text-decoration: underline; }

        .back-home {
            display: inline-block;
            margin-top: 30px;
            color: #607D8B;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .back-home:hover { color: #455A64; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h1 id="form-title">ĐĂNG NHẬP</h1>
        
        <form id="auth-form">
            <div class="input-group">
                <label for="email">Email của bạn</label>
                <input type="email" id="email" placeholder="ví dụ: student@gmail.com" required>
            </div>
            
            <div class="input-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu" required minlength="6">
            </div>

            <button type="submit" class="primary-btn" id="submit-btn">Vào phòng thi</button>
        </form>

        <div class="toggle-link" id="toggle-text">
            Chưa có tài khoản? <span onclick="toggleMode()">Đăng ký ngay</span>
        </div>

        <a href="index.html" class="back-home">🔙 Quay lại Sảnh chính</a>
    </div>

    <script>
        // TRẠNG THÁI GIAO DIỆN: Mặc định là Đăng nhập (true)
        let isLoginMode = true;

        // Hàm thay đổi giao diện giữa Đăng Nhập và Đăng Ký
        function toggleMode() {
            isLoginMode = !isLoginMode; // Lật ngược trạng thái

            const title = document.getElementById('form-title');
            const btn = document.getElementById('submit-btn');
            const toggleText = document.getElementById('toggle-text');

            if (isLoginMode) {
                // Đổi thành giao diện Đăng nhập
                title.innerText = "ĐĂNG NHẬP";
                btn.innerText = "Vào phòng thi";
                btn.style.backgroundColor = "#2196F3";
                toggleText.innerHTML = 'Chưa có tài khoản? <span onclick="toggleMode()">Đăng ký ngay</span>';
            } else {
                // Đổi thành giao diện Đăng ký
                title.innerText = "TẠO TÀI KHOẢN MỚI";
                btn.innerText = "Đăng ký thành viên";
                btn.style.backgroundColor = "#4CAF50"; // Đổi màu xanh lá cho khác biệt
                toggleText.innerHTML = 'Đã có tài khoản? <span onclick="toggleMode()">Đăng nhập</span>';
            }
        }

        // Hàm xử lý khi bấm nút Submit (Tạm thời chặn lại để sau này nối với Firebase)
        document.getElementById('auth-form').addEventListener('submit', function(event) {
            event.preventDefault(); // Ngăn web tự động tải lại trang
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (isLoginMode) {
                alert(`Giao diện hoạt động tốt! Chờ gắn Firebase để ĐĂNG NHẬP cho: ${email}`);
            } else {
                alert(`Giao diện hoạt động tốt! Chờ gắn Firebase để ĐĂNG KÝ cho: ${email}`);
            }
        });
    </script>

</body>
</html>
