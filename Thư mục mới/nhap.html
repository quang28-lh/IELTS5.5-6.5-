<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Bách Khoa Toàn Thư IELTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- Hệ thống màu sắc và font chữ --- */
        :root {
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --primary: #d32f2f;
            --secondary: #1976d2;
            --success: #22c55e;
            --font-family: 'Inter', sans-serif;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-main);
            margin: 0;
            padding: 20px;
            color: var(--text-main);
        }

        .progress-container {
            position: relative;
            width: 100%;
            height: 100px;
            background-color: #f0f4f8;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            width: 0;
            border-radius: 20px;
            transition: width 2s ease-in-out;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: 600;
            color: white;
            z-index: 10;
        }

        .stars {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            animation: star-animation 2s infinite ease-in-out;
        }

        .star {
            font-size: 30px;
            color: #ffeb3b;
            opacity: 0;
            animation: fadeInOut 2s infinite ease-in-out;
        }

        @keyframes fadeInOut {
            0%, 100% {
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
        }

        @keyframes star-animation {
            0% {
                transform: translateX(-50%) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(10px);
            }
            100% {
                transform: translateX(-50%) translateY(0);
            }
        }

        .water-animation {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: url('https://cdn.pixabay.com/photo/2016/11/22/19/42/waves-1850162_960_720.jpg') repeat-x;
            animation: water-wave 2s infinite linear;
            z-index: 5;
        }

        @keyframes water-wave {
            from {
                background-position: 0 0;
            }
            to {
                background-position: 100% 0;
            }
        }
    </style>
</head>
<body>
    <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
        <div class="progress-text" id="progress-text">78%</div>
        <div class="stars">
            <div class="star">⭐</div>
            <div class="star">⭐</div>
            <div class="star">⭐</div>
            <div class="star">⭐</div>
            <div class="star">⭐</div>
        </div>
        <div class="water-animation"></div>
    </div>

    <script>
        // Cập nhật tiến độ
        function updateProgressBar(percentage) {
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');
            progressBar.style.width = percentage + '%';
            progressText.textContent = percentage + '%';
        }

        // Cập nhật tiến độ cho 78%
        updateProgressBar(78);

        // Tạo hiệu ứng nước chuyển động
        const waterAnimation = document.querySelector('.water-animation');
        waterAnimation.style.animationDuration = '3s'; // Điều chỉnh tốc độ sóng

        // Hiệu ứng sao động
        setInterval(() => {
            const stars = document.querySelectorAll('.star');
            stars.forEach(star => {
                star.style.animationDuration = `${Math.random() * 1 + 1}s`;
            });
        }, 500);
    </script>
</body>
</html>
