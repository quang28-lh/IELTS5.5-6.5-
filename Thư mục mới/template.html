<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Listening - Test [X]</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%); display: flex; justify-content: center; padding: 40px 0; margin: 0; }
        .ielts-container { background-color: #ffffff; width: 800px; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .header { border-bottom: 2px solid #e0e0e0; padding-bottom: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        h1 { color: #d32f2f; margin: 0; font-size: 26px; text-transform: uppercase; }
        .band-target { background-color: #4CAF50; color: white; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        .instruction { color: #333; font-size: 15px; font-style: italic; margin-bottom: 20px; }
        .word-limit { font-weight: bold; text-transform: uppercase; }
        audio { width: 100%; outline: none; margin-bottom: 30px; }
        
        .question-box { background-color: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #dee2e6; margin-bottom: 30px; line-height: 1.8; font-size: 16px; }
        .question-title { font-weight: bold; text-transform: uppercase; text-align: center; margin-bottom: 15px; font-size: 18px; }
        
        input[type="text"] { padding: 5px 8px; border: 0; border-bottom: 2px dashed #666; background-color: transparent; width: 150px; font-size: 16px; font-family: inherit; color: #d32f2f; font-weight: bold; transition: 0.3s; }
        input[type="text"]:focus { border-bottom: 2px solid #d32f2f; outline: none; }
        .q-num { font-weight: bold; margin-right: 5px; font-size: 15px; background-color: #333; color: white; padding: 2px 6px; border-radius: 4px; }
        
        .submit-btn, .transcript-btn, .home-btn { color: white; border: none; padding: 12px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 15px; font-weight: bold; transition: 0.3s; box-sizing: border-box; }
        .submit-btn { background-color: #d32f2f; font-size: 18px; padding: 15px; }
        .submit-btn:hover { background-color: #b71c1c; }
        .transcript-btn { background-color: #2196F3; }
        .transcript-btn:hover { background-color: #1976D2; }
        .home-btn { background-color: #607D8B; text-decoration: none; display: block; text-align: center; }
        .home-btn:hover { background-color: #455A64; }

        .transcript-box { margin-top: 25px; padding: 20px; background-color: #f1f8e9; border: 1px solid #c5e1a5; border-radius: 8px; font-size: 15px; line-height: 1.6; color: #333; display: none; }
        .highlight { background-color: #ffeb3b; font-weight: bold; padding: 2px 4px; border-radius: 3px; color: #d32f2f; }
    </style>
</head>
<body>

    <div class="ielts-container">
        <div class="header">
            <h1>Listening - Test [X]</h1>
            <div class="band-target">Target: 5.5 - 6.0</div>
        </div>
        
        <audio controls>
            <source src="test[X].mp3" type="audio/mpeg">
        </audio>

        <p><strong>Questions 1–10</strong></p>
        <p class="instruction">Write <span class="word-limit">NO MORE THAN THREE WORDS</span> for each answer.</p>

        <div class="question-box">
            <div class="question-title">TIÊU ĐỀ BÀI NGHE</div>
            <p><span class="q-num">1</span> Nội dung câu hỏi... <input type="text"></p>
            <p><span class="q-num">2</span> Nội dung câu hỏi... <input type="text"></p>
        </div>

        <button class="submit-btn" onclick="checkAnswers()">Nộp Bài / Submit</button>
        <button class="transcript-btn" onclick="toggleTranscript()">Xem Transcript & Đáp án</button>
        <a href="index.html" class="home-btn">🔙 Quay lại Sảnh chính</a>

        <div id="transcript-box" class="transcript-box">
            <p>Dán phần chữ Transcript của bạn vào đây. Dùng thẻ <strong>&lt;span class="highlight"&gt;đáp án&lt;/span&gt;</strong> để tô vàng.</p>
        </div>

    </div>

    <script>
        // NHẬP ĐÁP ÁN VÀO ĐÂY (mỗi dòng 1 câu, các cách viết cách nhau bởi dấu phẩy)
        const answers = [
            ["đáp án 1a", "đáp án 1b"], 
            ["đáp án 2"] 
        ];

        function checkAnswers() {
            const submitBtn = document.querySelector('.submit-btn');
            const inputs = document.querySelectorAll('input[type="text"]');
            let score = 0;
            
            inputs.forEach((input, index) => {
                let userAnswer = input.value.toLowerCase().trim();
                let isCorrect = false;

                if (userAnswer !== "" && answers[index] && answers[index].includes(userAnswer)) {
                    isCorrect = true;
                }

                if (isCorrect) {
                    input.style.color = "#4CAF50"; 
                    input.style.borderBottomColor = "#4CAF50";
                    score++;
                } else {
                    input.style.color = "#d32f2f"; 
                    input.style.borderBottomColor = "#d32f2f";
                    if (answers[index]) {
                        input.value = (userAnswer === "") ? "Trống! -> " + answers[index][0] : userAnswer + " -> " + answers[index][0];
                    }
                }
            });
            submitBtn.innerHTML = `Bạn đã đúng ${score} câu! (F5 để làm lại)`;
            submitBtn.style.backgroundColor = (score >= (answers.length/2)) ? "#4CAF50" : "#ff9800";
        }

        function toggleTranscript() {
            const box = document.getElementById("transcript-box");
            box.style.display = (box.style.display === "none" || box.style.display === "") ? "block" : "none";
        }
    </script>
</body>
</html>
