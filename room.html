<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phòng Thi IELTS PRO - Hệ Thống Thông Minh</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e293b;
            --accent: #2563eb;
            --success: #22c55e;
            --ai-color: #8b5cf6;
            --danger: #ef4444;
            --text-main: #1e293b;
            --text-sub: #64748b;
        }

        body {
            background-color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            color: var(--text-main);
        }

        .room-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 35px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid #e2e8f0;
            position: relative;
        }

        #transcript-container {
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 16px;
            display: none;
            margin-top: 35px;
            padding: 25px;
            border: 1px solid #e2e8f0;
            border-radius: 15px;
            background: #fff;
        }

        .test-title {
            color: var(--text-main);
            margin-bottom: 8px;
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .test-info {
            margin-bottom: 30px;
            color: var(--text-sub);
            font-weight: 700;
            background: #f1f5f9;
            padding: 8px 18px;
            border-radius: 30px;
            display: inline-block;
            font-size: 14px;
        }

        .audio-player {
            width: 100%;
            margin: 25px 0;
            background: #f8fafc;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #e2e8f0;
            box-sizing: border-box;
        }

        .test-content {
            margin-top: 30px;
            line-height: 1.8;
        }

        .action-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 50px;
            padding-top: 30px;
            border-top: 2px dashed #e2e8f0;
        }

        .btn-main {
            padding: 16px 50px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 800;
            font-size: 16px;
            transition: all 0.2s;
            width: 100%;
            max-width: 400px;
            color: white;
            text-align: center;
            text-decoration: none;
        }

        .btn-submit {
            background: var(--success);
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.2);
        }

        .btn-ai {
            background: var(--ai-color);
            display: none;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2);
        }

        .btn-main:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn-main:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        #ai-feedback-area {
            display: none;
            width: 100%;
            margin-top: 40px;
            padding: 30px;
            background: #fdf4ff;
            border: 2px solid #d8b4fe;
            border-radius: 20px;
            box-sizing: border-box;
        }

        .loading-spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--ai-color);
            font-weight: 700;
            padding: 20px;
        }

        .timer-widget {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--primary);
            color: white;
            padding: 18px;
            border-radius: 15px;
            z-index: 1000;
            text-align: center;
            min-width: 140px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .timer-display {
            font-size: 32px;
            font-weight: 800;
            color: #fbbf24;
            font-family: monospace;
        }
    </style>
</head>

<body>

    <div class="timer-widget" id="timer-box">
        <div style="font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8;">Time Remaining</div>
        <div class="timer-display" id="time-show">00:00</div>
        <div id="timer-setup-box" style="margin-top: 12px; display: flex; justify-content: center; gap: 8px;">
            <input type="number" id="timer-minutes"
                style="width: 50px; text-align: center; border-radius: 5px; border: none;" value="60">
            <button onclick="window.startTimer()"
                style="background: var(--accent); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: 800;">BẮT
                ĐẦU</button>
        </div>
    </div>

    <div class="room-container">
        <button onclick="window.history.back()"
            style="background: #f1f5f9; border: 1px solid #cbd5e1; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 700; margin-bottom: 25px;">⬅
            QUAY LẠI</button>

        <h1 id="display-title" class="test-title">Đang tải đề thi...</h1>
        <div id="display-info" class="test-info">...</div>

        <div id="audio-area" class="audio-player" style="display: none;">
            <div style="font-weight: 800; color: #d32f2f; margin-bottom: 10px;">🎧 AUDIO PLAYER:</div>
            <audio id="main-audio" controls style="width: 100%;"></audio>
        </div>

        <div id="display-content" class="test-content"></div>

        <div class="action-container">
            <button id="btn-submit-main" class="btn-main btn-submit" onclick="window.checkAnswers()">NỘP BÀI & LƯU KẾT
                QUẢ</button>
            <button id="btn-ai-grade" class="btn-main btn-ai" onclick="window.gradeWithAI()">✨ GIÁM KHẢO AI CHẤM CHI
                TIẾT</button>

            <div id="results-area" style="text-align: center; margin-top: 20px;"></div>

            <div id="ai-feedback-area">
                <div id="ai-loading" class="loading-spinner" style="display: none;">
                    <img src="https://i.gifer.com/ZKZg.gif" width="30"> <span>Giám khảo AI đang chấm bài...</span>
                </div>
                <div id="ai-response-content"></div>
            </div>

            <button id="btn-toggle" class="btn-main" style="background: var(--primary); display:none; margin-top: 20px;"
                onclick="window.toggleTranscript()">📖 XEM GIẢI THÍCH & BÀI MẪU</button>
        </div>
        <div id="transcript-container"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAf846RI3kuxaWv_BCo3g4atdYK0iG98ds",
            authDomain: "luyen-nghe-ielts.firebaseapp.com",
            projectId: "luyen-nghe-ielts",
            storageBucket: "luyen-nghe-ielts.appspot.com",
            messagingSenderId: "775558062967",
            appId: "1:775558062967:web:271a33748234ea7234"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let currentAnswers = [];
        const testId = new URLSearchParams(window.location.search).get('id');

        onAuthStateChanged(auth, user => { currentUser = user; });

        // --- 1. KHÔI PHỤC HÀM NỘP BÀI (FIX LỖI NOT A FUNCTION) ---
        window.checkAnswers = async function () {
            if (window.timerInterval) clearInterval(window.timerInterval);
            const btnSubmit = document.getElementById('btn-submit-main');
            btnSubmit.disabled = true;
            btnSubmit.innerText = "⏳ ĐANG LƯU...";

            let score = 0;
            const inputs = document.querySelectorAll('input[data-q]');
            if (inputs.length > 0) {
                inputs.forEach((input, index) => {
                    const userVal = input.value.trim().toLowerCase();
                    const correct = currentAnswers[index]?.toString().toLowerCase().split('/').map(s => s.trim()) || [];
                    if (correct.includes(userVal) && userVal !== "") {
                        score++;
                        input.style.background = "#dcfce7";
                    } else { input.style.background = "#fee2e2"; }
                });
                document.getElementById('results-area').innerHTML = `<h3>Kết quả: ${score}/${inputs.length}</h3>`;
            }
            await saveToFirebase(score || "N/A");
            btnSubmit.innerText = "ĐÃ NỘP BÀI";
            document.getElementById('btn-toggle').style.display = 'block';
        };

        // --- 2. HÀM CHẤM ĐIỂM AI: TỰ ĐỘNG XOAY TUA (AUTO-RETRY LOOP) ---
        if (window.keyIndex === undefined) window.keyIndex = 0;

        window.gradeWithAI = async function () {
    const essay = document.querySelector('textarea')?.value.trim();
    if (!essay || essay.length < 50) return alert("Viết thêm đi ông giáo, ngắn quá AI không chấm được!");

    const content = document.getElementById('ai-response-content');
    const loading = document.getElementById('ai-loading');
    document.getElementById('ai-feedback-area').style.display = 'block';
    loading.style.display = 'flex';
    content.innerHTML = '';

    // 1. DANH SÁCH 3 KEY MỚI NHẤT
    const apiKeys = [
        "AIzaSyCwElxJ0Mqpo-ZaI-IsTpb_MmRzjApVn3o",
        "AIzaSyD2H6it04KqfJiPuGzYg8e3McyM1eyZqFc",
        "AIzaSyCpzJ5Kaprx779zvt_o6xlV2tukbzIoqrY"
    ];

    let success = false;
    // Tự động xoay tua thử từng Key
    for (let i = 0; i < apiKeys.length; i++) {
        const currentKey = apiKeys[window.keyIndex % apiKeys.length];
        window.keyIndex++;

        try {
            // URL PHẢI DÙNG V1BETA ĐỂ TRÁNH LỖI 404
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${currentKey}`;
            
            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: `Bạn là giám khảo IELTS. Chấm điểm bài viết sau (Đề: ${document.getElementById('display-title').innerText}): ${essay}. Trình bày bằng HTML đẹp.`
                        }]
                    }]
                })
            });

            const data = await res.json();

            if (res.ok) {
                loading.style.display = 'none';
                content.innerHTML = data.candidates[0].content.parts[0].text.replace(/```html|```/g, '');
                success = true;
                break; 
            } else {
                console.error("Lỗi từ Google:", data.error?.message || "Không xác định");
                if (res.status === 429) continue; // Nếu quá tải thì thử Key tiếp theo
            }
        } catch (e) { console.error("Lỗi kết nối:", e); }
    }

    if (!success) {
        loading.style.display = 'none';
        content.innerHTML = `<div style="background:#fee2e2; padding:20px; border-radius:12px; color:#ef4444; font-weight:700; border:1px solid #fecaca;">
            ❌ LỖI HỆ THỐNG (400/429). <br>
            Ông giáo hãy kiểm tra lại xem API Key có bị copy thiếu ký tự nào không, giữ nguyên 4G và thử lại nhé!
        </div>`;
    }
};

        // --- 3. CÁC HÀM TIỆN ÍCH ---
        window.startTimer = () => {
            let time = parseInt(document.getElementById('timer-minutes').value) * 60;
            document.getElementById('timer-setup-box').style.display = 'none';
            window.timerInterval = setInterval(() => {
                time--;
                let m = Math.floor(time / 60), s = time % 60;
                document.getElementById('time-show').innerText = `${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;
                if (time <= 0) { clearInterval(window.timerInterval); window.checkAnswers(); }
            }, 1000);
        };

        window.toggleTranscript = () => {
            const box = document.getElementById('transcript-container');
            box.style.display = box.style.display === 'block' ? 'none' : 'block';
        };

        async function saveToFirebase(finalScore) {
            if (!currentUser) return;
            try {
                await addDoc(collection(db, "results"), {
                    userId: currentUser.uid,
                    testId: testId,
                    testTitle: document.getElementById('display-title').innerText,
                    score: finalScore,
                    timestamp: serverTimestamp()
                });
            } catch (e) { console.error(e); }
        }

        async function loadRoom() {
            if (!testId) return;
            const cols = ['listening_tests', 'reading_tests', 'writing_tests', 'speaking_tests'];
            for (let col of cols) {
                const snap = await getDoc(doc(db, col, testId));
                if (snap.exists()) {
                    const data = snap.data();
                    currentAnswers = data.answers || [];
                    document.getElementById('display-title').innerText = data.title;
                    document.getElementById('display-info').innerText = col.toUpperCase();
                    document.getElementById('display-content').innerHTML = data.content;
                    document.getElementById('transcript-container').innerHTML = data.explain || "Không có giải thích.";
                    if (data.audioUrl) {
                        document.getElementById('audio-area').style.display = 'block';
                        document.getElementById('main-audio').src = data.audioUrl;
                    }
                    if (col === 'writing_tests') document.getElementById('btn-ai-grade').style.display = 'block';
                    break;
                }
            }
        }
        loadRoom();
    </script>
</body>

</html>
