<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phòng Thi IELTS PRO - Hệ Thống Thông Minh</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e293b;
            --accent: #2563eb;
            --success: #22c55e;
            --ai-color: #8b5cf6;
            --text-main: #1e293b;
            --text-sub: #64748b;
        }

        body {
            background-color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            color: var(--text-main);
        }

        .room-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 35px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid #e2e8f0;
            position: relative;
        }

        #transcript-container {
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 16px;
            display: none;
            margin-top: 35px;
            padding: 25px;
            border: 1px solid #e2e8f0;
            border-radius: 15px;
            background: #fff;
        }

        .test-title {
            color: var(--text-main);
            margin-bottom: 8px;
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .test-info {
            margin-bottom: 30px;
            color: var(--text-sub);
            font-weight: 700;
            background: #f1f5f9;
            padding: 8px 18px;
            border-radius: 30px;
            display: inline-block;
            font-size: 14px;
        }

        .audio-player {
            width: 100%;
            margin: 25px 0;
            background: #f8fafc;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #e2e8f0;
            box-sizing: border-box;
        }

        .test-content {
            margin-top: 30px;
            line-height: 1.8;
        }

        .highlighted-text {
            background-color: #fef08a;
            border-bottom: 2px solid #eab308;
            cursor: pointer;
            border-radius: 2px;
        }

        .action-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 50px;
            padding-top: 30px;
            border-top: 2px dashed #e2e8f0;
        }

        .btn-main {
            padding: 16px 50px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 800;
            font-size: 16px;
            transition: all 0.3s;
            width: 100%;
            max-width: 400px;
            color: white;
        }

        .btn-submit {
            background: var(--success);
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }

        .btn-ai {
            background: var(--ai-color);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
            display: none;
        }

        .btn-main:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        .btn-main:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
        }

        .btn-transcript {
            padding: 14px 30px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            display: none;
            margin-top: 20px;
        }

        #ai-feedback-area {
            display: none;
            width: 100%;
            text-align: left;
            margin-top: 40px;
            padding: 30px;
            background: #fdf4ff;
            border: 2px solid #d8b4fe;
            border-radius: 20px;
        }

        .timer-widget {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--primary);
            color: white;
            padding: 18px;
            border-radius: 15px;
            z-index: 1000;
            text-align: center;
            min-width: 140px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
        }

        .timer-display {
            font-size: 32px;
            font-weight: 800;
            color: #fbbf24;
            font-family: 'Courier New', monospace;
        }

        #highlight-btn-pop {
            position: absolute;
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            display: none;
            z-index: 9999;
            font-weight: 800;
        }
    </style>
</head>

<body>

    <div class="timer-widget" id="timer-box">
        <div style="font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8;">Time Remaining</div>
        <div class="timer-display" id="time-show">00:00</div>
        <div id="timer-setup-box" style="margin-top: 12px; display: flex; justify-content: center; gap: 8px;">
            <input type="number" id="timer-minutes" style="width: 50px; text-align: center;" value="60">
            <button onclick="startTimer()"
                style="background: var(--accent); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer;">BẮT
                ĐẦU</button>
        </div>
    </div>

    <div class="room-container">
        <button onclick="window.history.back()"
            style="background: #f1f5f9; border: 1px solid #cbd5e1; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 700; margin-bottom: 25px;">⬅
            QUAY LẠI</button>

        <h1 id="display-title" class="test-title">Đang tải đề thi...</h1>
        <div id="display-info" class="test-info">...</div>

        <div id="audio-area" class="audio-player" style="display: none;">
            <div style="font-weight: 800; color: #d32f2f; margin-bottom: 10px;">🎧 AUDIO PLAYER:</div>
            <audio id="main-audio" controls style="width: 100%;"></audio>
        </div>

        <div id="display-content" class="test-content"></div>

        <div class="action-container">
            <button id="btn-submit-main" class="btn-main btn-submit" onclick="checkAnswers()">NỘP BÀI & LƯU KẾT
                QUẢ</button>
            <button id="btn-ai-grade" class="btn-main btn-ai" onclick="gradeWithAI()">✨ GIÁM KHẢO AI CHẤM CHI
                TIẾT</button>

            <div id="results-area" style="text-align: center; margin-top: 20px;"></div>

            <div id="ai-feedback-area">
                <div id="ai-loading" style="display: none; text-align: center;">
                    <img src="https://i.gifer.com/ZKZg.gif" width="30"> <span>Giám khảo AI đang chấm bài...</span>
                </div>
                <div id="ai-response-content"></div>
            </div>

            <button id="btn-toggle" class="btn-transcript" onclick="toggleTranscript()">📖 XEM GIẢI THÍCH & BÀI
                MẪU</button>
        </div>
        <div id="transcript-container"></div>
    </div>

    <button id="highlight-btn-pop">✏️ Highlight</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAf846RI3kuxaWv_BCo3g4atdYK0iG98ds",
            authDomain: "luyen-nghe-ielts.firebaseapp.com",
            projectId: "luyen-nghe-ielts",
            storageBucket: "luyen-nghe-ielts.appspot.com",
            messagingSenderId: "775558062967",
            appId: "1:775558062967:web:271a33748234ea7234"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let currentAnswers = [];
        const testId = new URLSearchParams(window.location.search).get('id');

        // Theo dõi trạng thái đăng nhập
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (!user) {
                alert("Lưu ý: Bạn chưa đăng nhập. Kết quả sẽ không được lưu vào lịch sử.");
            }
        });

        // --- HÀM LƯU KẾT QUẢ LÊN FIREBASE (QUAN TRỌNG NHẤT) ---
        async function saveToFirebase(finalScore) {
            if (!currentUser) return;

            const title = document.getElementById('display-title').innerText;
            try {
                await addDoc(collection(db, "results"), {
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    testId: testId,
                    testTitle: title, // Đồng bộ tên bài thi cho trang index.html
                    score: finalScore,
                    timestamp: serverTimestamp()
                });
                console.log("✅ Đã lưu kết quả thành công!");
            } catch (e) {
                console.error("❌ Lỗi lưu Firebase:", e);
            }
        }

        // --- HÀM CHẤM ĐIỂM ---
        window.checkAnswers = async function () {
            if (window.timerInterval) clearInterval(window.timerInterval);
            const btnSubmit = document.getElementById('btn-submit-main');
            btnSubmit.disabled = true;
            btnSubmit.innerText = "⏳ ĐANG XỬ LÝ...";

            let score = 0;
            // Nếu là bài trắc nghiệm (Reading/Listening)
            if (currentAnswers.length > 0) {
                currentAnswers.forEach((ans, index) => {
                    const input = document.querySelector(`input[data-q="${index + 1}"]`);
                    if (input) {
                        const userVal = input.value.trim().toLowerCase();
                        const corrects = ans.toString().toLowerCase().split('/').map(s => s.trim());
                        if (corrects.includes(userVal)) {
                            score++;
                            input.style.background = "#dcfce7";
                            input.style.borderColor = "#22c55e";
                        } else {
                            input.style.background = "#fee2e2";
                            input.style.borderColor = "#ef4444";
                        }
                    }
                });

                // Quy đổi về thang điểm 10 nếu cần, hoặc để nguyên score/total
                // Ở đây mình cứ để nguyên số câu đúng để đồng bộ với index.html
                document.getElementById('results-area').innerHTML = `<h3>Kết quả: <span style="color:#d32f2f;">${score}/${currentAnswers.length}</span> câu đúng!</h3>`;

                // LƯU LÊN FIREBASE
                await saveToFirebase(score);
            } else {
                // Nếu là bài Writing/Speaking (không có mảng answers sẵn)
                alert("Đã ghi nhận bài làm của bạn!");
                await saveToFirebase("N/A");
            }

            btnSubmit.innerText = "ĐÃ NỘP BÀI";
            document.getElementById('btn-toggle').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        };

        // --- HÀM CHẤM ĐIỂM AI ---
        // --- HÀM CHẤM ĐIỂM AI NÂNG CẤP (CÓ BÁO LỖI CHI TIẾT) ---
        window.gradeWithAI = async function () {
            const essay = document.querySelector('textarea')?.value.trim();
            const title = document.getElementById('display-title').innerText;

            if (!essay || essay.length < 50) {
                alert("Bài viết quá ngắn! Cần ít nhất 50 chữ để Giám khảo AI làm việc nhé.");
                return;
            }

            const feedbackArea = document.getElementById('ai-feedback-area');
            const loading = document.getElementById('ai-loading');
            const content = document.getElementById('ai-response-content');

            feedbackArea.style.display = 'block';
            loading.style.display = 'block';
            content.innerHTML = ''; // Xóa kết quả cũ
            window.scrollTo({ top: feedbackArea.offsetTop - 100, behavior: 'smooth' });

            // SỬA TẠI ĐÂY: Dùng chung API Key ở FirebaseConfig nếu bạn đã bật AI trên Google Cloud
            // Hoặc lấy Key mới tại: https://aistudio.google.com/app/apikey
            const apiKey = "AIzaSyDXMG1KKDImHpJifR76JvS9rPT44CiJYuE";

            // Cập nhật lên bản ổn định v1
           const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            try {
                const res = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `Bạn là giám khảo IELTS chuyên nghiệp. Hãy chấm điểm Overall và nhận xét lỗi sai cho bài Writing này bằng tiếng Việt. Đề bài: ${title}. Bài làm: ${essay}. Trình bày đẹp bằng định dạng HTML (dùng thẻ <b>, <p>, <ul>...).`
                            }]
                        }]
                    })
                });

                const data = await res.json();

                if (data.error) {
                    console.error("Chi tiết lỗi API:", data.error);
                    throw new Error(data.error.message || "Lỗi kết nối API");
                }

                if (data.candidates && data.candidates[0].content) {
                    loading.style.display = 'none';
                    let aiText = data.candidates[0].content.parts[0].text;
                    // Gemini đôi khi trả về markdown bọc trong ```html ... ```
                    aiText = aiText.replace(/```html|```/g, '');
                    content.innerHTML = aiText;
                } else {
                    throw new Error("AI không trả về kết quả. Có thể nội dung vi phạm chính sách an toàn.");
                }

            } catch (error) {
                console.error("Lỗi hệ thống:", error);
                loading.style.display = 'none';
                content.innerHTML = `
                    <div style="color:#b91c1c; padding:20px; border:2px solid #fca5a5; border-radius:15px; background:#fef2f2;">
                        <b style="font-size:16px;">⚠️ GIÁM KHẢO AI ĐANG BẬN:</b><br>
                        <p style="margin:10px 0; font-size:14px;">Lý do: <i>${error.message}</i></p>
                        <small>Mẹo: Nếu lỗi báo 'API key not valid', hãy vào Google AI Studio tạo lại Key mới và dán vào code nhé!</small>
                    </div>`;
            }
        };

        // --- TIMER & UI ---
        window.startTimer = function () {
            let time = parseInt(document.getElementById('timer-minutes').value) * 60;
            document.getElementById('timer-setup-box').style.display = 'none';
            window.timerInterval = setInterval(() => {
                time--;
                let m = Math.floor(time / 60), s = time % 60;
                document.getElementById('time-show').innerText = `${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;
                if (time <= 0) { clearInterval(window.timerInterval); window.checkAnswers(); }
            }, 1000);
        };

        window.toggleTranscript = function () {
            const box = document.getElementById('transcript-container');
            box.style.display = (box.style.display === 'block') ? 'none' : 'block';
        };

        // --- TẢI DỮ LIỆU ---
        async function loadRoom() {
            if (!testId) return;
            const collections = ['listening_tests', 'reading_tests', 'writing_tests', 'speaking_tests'];
            for (let col of collections) {
                const snap = await getDoc(doc(db, col, testId));
                if (snap.exists()) {
                    const data = snap.data();
                    currentAnswers = data.answers || [];
                    document.getElementById('display-title').innerText = data.title;
                    document.getElementById('display-info').innerText = col.split('_')[0].toUpperCase();
                    document.getElementById('display-content').innerHTML = data.content;
                    document.getElementById('transcript-container').innerHTML = data.explain || data.transcript || "Không có giải thích.";
                    if (data.audioUrl) {
                        document.getElementById('audio-area').style.display = 'block';
                        document.getElementById('main-audio').src = data.audioUrl;
                    }
                    if (col === 'writing_tests') document.getElementById('btn-ai-grade').style.display = 'block';
                    break;
                }
            }
        }
        loadRoom();
    </script>
</body>

</html>
